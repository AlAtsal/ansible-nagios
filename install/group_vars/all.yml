
---

## Ansible user
# change this if running Ansible as a non-root user
# would require sudo, e.g. AWS EC2 uses ec-user
ansible_system_user: root

### Firewall management ###
# Set to true to deploy firewall rules for nagios server
manage_firewall: true
# Set to true to deploy firewall rules for client nrpe
manage_firewall_client: true

### Nagios Variables ###
nagios_plugin_path: /usr/lib64/nagios/plugins
nagios_username: nagiosadmin
nagios_password: changeme
nagios_create_guest_user: true
nagios_ro_username: guest
nagios_ro_password: guest
nagios_http_port: 80
nagios_https_port: 443
admin_name_01: nagiosadmin
# change this to your email address if you want notifications
admin_email_01: nagios@localhost
# set to false if you don't want to monitor swap
# on your nagios server
nagios_host_monitor_swap: true
### webhook alert settings
# set to true to enable alerting via a remote webhook.
enable_webhook_alerts: false 
webhook_alerts_url: https://chat.example.com/v1/spaces/AAAABBBBCCCC

### NRPE variables ###
nrpe_tcp_port: 5666
# threshold for # of processes
warning_proc: 900
critical_proc: 1000
# threshold for # of logged in users
warning_users: 15
critical_users: 30
# NRPE version, default is -2 for version 2
# this is used if you get compatibility issues with nrpe
# valid options -2, or blank
nrpe_version: -2

### services ports ###
# jenkins
jenkins_port: 8080
# set to true if you use a reverse proxy
# like nginx for jenkins
jenkins_uses_proxy: true
# username/pass for reverse proxy auth
jenkins_user: jenkinsadmin
jenkins_pass: jenkinspass

# elasticsearch
elasticsearch_port: 9200

### ELK options ###
# if you use my ELK playbook you'll need this for HTTP checks
# https://github.com/sadsfae/ansible-elk
kibana_user: admin
kibana_password: admin
### generic http options for oobserver ###
# if your generic oobserver http checks need auth
oobserver_use_auth: false
oobserver_user: admin
oobserver_pass: admin
### HTTP options ###
# follow 301 / redirects with check_http by default
# otherwise set this to false.
check_http_301_ok: true
# check_ssl_cert options for webservers_ssl
#
# check server certificate transparency (SCT)
# and disallow self-signed certificates.
# default is false
ssl_check_sct_self_signed: false
# days to warn for certificate expiration
ssl_cert_exp_warn_days: 60
# days to set critical alert for expiration
ssl_cert_exp_crit_days: 30

### DNS Service Options
# dns domain you want service checks to query
dns_check_domain: example.com

### FreeNAS Options
# change to false if you're using http, which is a bad idea
# if you're not in an internal, trusted network or VPN.
freenas_use_ssl: false
# FreeNAS checks require root credentials or some user created within FreeNAS
# UI that can access the API with full privileges
freenas_user: root
freenas_pass: password

### QUADS Server Options
# Time threshold (in hours) for active & unvalidated assignments
quads_validate_check_threshold: 2

### File Monitor Options ###
# LEGACY: Simple single-file monitoring (backward compatible)
# Path to file to monitor for age/timestamp
filemon_target_file: /var/log/important.log
# Warning threshold in days (alert when file is older than this)
filemon_warn_days: 7
# Critical threshold in days (alert when file is older than this)
filemon_crit_days: 10

# ADVANCED: Per-host multi-file monitoring configuration
# Define files to monitor for each host in [filemon_hosts] group
# If a host is defined here, it will use this config instead of the legacy options above
filemon_hosts_config: {}
