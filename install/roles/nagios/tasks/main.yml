---
# Playbook to install nagios server and generate hosts/checks
# Refactored for modern Ansible modules, RHEL/Rocky 10, and Debian/Ubuntu support

- name: Check Operating System
  ansible.builtin.fail:
    msg: "You're not running a supported operating system (CentOS7, Rocky8+, RHEL7+, Debian, Ubuntu)"
  when:
    - ansible_os_family not in ["RedHat", "Debian"]

# --- ADDED: Dynamic OS Variables ---
- name: Set RedHat specific variables
  ansible.builtin.set_fact:
    nagios_pkg: nagios
    nagios_dir: /etc/nagios
    plugin_dir: /usr/lib64/nagios/plugins
    web_service: httpd
    web_user: apache
    nagios_service: nagios
    passwd_file: /etc/nagios/passwd
    httpd_conf: /etc/httpd/conf/httpd.conf
  when: ansible_os_family == "RedHat"

- name: Set Debian specific variables
  ansible.builtin.set_fact:
    nagios_pkg: nagios4
    nagios_dir: /etc/nagios4
    plugin_dir: /usr/lib/nagios/plugins
    web_service: apache2
    web_user: www-data
    nagios_service: nagios4
    passwd_file: /etc/nagios4/htpasswd.users
    httpd_conf: /etc/apache2/ports.conf
  when: ansible_os_family == "Debian"
# -----------------------------------

- name: Install gnupg2
  ansible.builtin.dnf:
    name: gnupg2
    state: present
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int >= 7

- name: Import EPEL GPG Key
  ansible.builtin.rpm_key:
    key: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
    state: present
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int >= 7

- name: Install EPEL Repository
  ansible.builtin.dnf:
    name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int >= 7

# --- MODIFIED: Split Web/Nagios dependencies by OS ---
- name: Install Web and SSL Dependencies (RedHat)
  ansible.builtin.package:
    name:
      - httpd
      - httpd-tools
      - mod_ssl
      - openssl
      - net-snmp-utils
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Install Web and SSL Dependencies (Debian)
  ansible.builtin.apt:
    name:
      - apache2
      - apache2-utils
      - ssl-cert
      - openssl
      - snmp
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: Setup nagios SSL HTTPD vhost (RedHat)
  ansible.builtin.template:
    src: nagios.conf.j2
    dest: /etc/httpd/conf.d/nagios.conf
  become: true
  when: ansible_os_family == "RedHat"

- name: Setup nagios SSL HTTPD vhost (Debian)
  ansible.builtin.template:
    src: nagios.conf.j2
    dest: /etc/apache2/conf-available/nagios-ssl.conf
  become: true
  when: ansible_os_family == "Debian"

- name: Enable Apache modules and config (Debian)
  ansible.builtin.command: "{{ item }}"
  loop:
    - a2enmod ssl
    - a2enmod cgi
    - a2enmod rewrite
    - a2enconf nagios-ssl
  become: true
  when: ansible_os_family == "Debian"
  register: apache_modules
  changed_when: "'already enabled' not in apache_modules.stdout and 'Enabling' in apache_modules.stdout"
  failed_when: apache_modules.rc != 0 and 'already enabled' not in apache_modules.stderr

- name: Install nagios packages and common plugins (RedHat)
  ansible.builtin.package:
    name:
      - nagios
      - nagios-common
      - nagios-plugins-ssh
      - nagios-plugins-tcp
      - nagios-plugins-http
      - nagios-plugins-load
      - nagios-plugins-nrpe
      - nagios-plugins-uptime
      - nagios-plugins-swap
      - nagios-plugins-ping
      - nagios-plugins-procs
      - nagios-plugins-users
      - nagios-plugins-disk
      - nagios-plugins-dns
      - bc
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Install nagios packages and common plugins (Debian)
  ansible.builtin.apt:
    name:
      - nagios4
      - nagios4-common
      - monitoring-plugins
      - monitoring-plugins-common
      - monitoring-plugins-standard
      - monitoring-plugins-basic
      - bc
      - python3-requests
    state: present
  become: true
  when: ansible_os_family == "Debian"
# -----------------------------------------------------

- name: Install EL7 specific nagios packages
  ansible.builtin.package:
    name:
      - libsemanage-python
      - python-requests
    state: present
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int == 7

- name: Install EL8+ specific nagios packages (includes RHEL 10)
  ansible.builtin.package:
    name:
      - libsemanage-python3
      - python3-requests
    state: present
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int >= 8

# --- MODIFIED: All subsequent tasks use dynamic variables ---
- name: Check nagios Users
  ansible.builtin.stat:
    path: "{{ passwd_file }}"
  register: nagios_user_pwfile_exists
  become: true

- name: Create empty password file
  ansible.builtin.file:
    path: "{{ passwd_file }}"
    state: touch
    owner: root
    group: "{{ web_user }}"
    mode: '0640'
  when: not nagios_user_pwfile_exists.stat.exists
  become: true

- name: Create nagios admin user
  ansible.builtin.command:
    cmd: htpasswd -b {{ passwd_file }} {{ nagios_username }} {{ nagios_password }}
  register: htpasswd_result
  changed_when: htpasswd_result.rc == 0
  become: true

- name: Create nagios guest user
  ansible.builtin.command:
    cmd: htpasswd -b {{ passwd_file }} {{ nagios_ro_username }} {{ nagios_ro_password }}
  when: nagios_create_guest_user|bool
  register: htpasswd_guest
  changed_when: htpasswd_guest.rc == 0
  become: true

- name: Configure nagios main configuration
  ansible.builtin.copy:
    src: nagios.cfg
    dest: "{{ nagios_dir }}/nagios.cfg"
  become: true

- name: Copy idrac check plugin
  ansible.builtin.copy:
    src: idrac_2.2rc4
    dest: "{{ plugin_dir }}/idrac_2.2rc4"
    mode: '0755'
  become: true

- name: Configure Dell idrac snmp mib file
  ansible.builtin.copy:
    src: idrac-smiv2.mib
    dest: "{{ snmp_mib_path }}/"
    mode: '0755'
  become: true

# Cleanup deprecated IPMI/SuperMicro monitoring files
- name: Remove deprecated IPMI configuration directory
  ansible.builtin.file:
    path: /etc/supermicro-ipmi-config
    state: absent
  become: true

- name: Remove deprecated IPMI check plugin
  ansible.builtin.file:
    path: "{{ plugin_dir }}/check_ipmi_sensor"
    state: absent
  become: true

- name: Remove deprecated IPMI config files from conf.d
  ansible.builtin.file:
    path: "{{ nagios_dir }}/conf.d/{{ item }}"
    state: absent
  loop:
    - ipmi.cfg
    - supermicro_6018r.cfg
    - supermicro_6048r.cfg
    - supermicro_1028r.cfg
  become: true

- name: Generate the nagios conf.d directory
  ansible.builtin.file:
    path: "{{ nagios_dir }}/conf.d"
    state: directory
  become: true

- name: Generate the nagios monitoring templates
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ nagios_dir }}/conf.d/{{ item }}"
    force: true
  loop:
    - oobservers.cfg
    - switches.cfg
    - webservers.cfg
    - webservers_with_ssl.cfg
    - servers.cfg
    - servers_with_mdadm_raid.cfg
    - commands.cfg
    - elkservers.cfg
    - elasticsearch.cfg
    - idrac.cfg
    - jenkins.cfg
    - dns.cfg
    - dns_with_mdadm_raid.cfg
    - freenas.cfg
    - devices.cfg
    - dns_only.cfg
    - quads_servers.cfg
    - quads_servers_with_ssl.cfg
    - filemon_hosts.cfg
  register: nagios_config
  become: true

- name: Generate the nagios contact template and localhost config
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ nagios_dir }}/objects/{{ item }}"
    force: true
  loop:
    - contacts.cfg
    - localhost.cfg
  register: nagios_objects
  become: true

- name: Generate additional commands.cfg from template
  ansible.builtin.template:
    src: objects_commands.cfg.j2
    dest: "{{ nagios_dir }}/objects/commands.cfg"
    force: true
  become: true

- name: Generate templated FreeNAS Python status script
  ansible.builtin.template:
    src: check_freenas.py.j2
    dest: "{{ plugin_dir }}/check_freenas.py"
    mode: '0755'
    force: true
  become: true

- name: Configure quads-check-assignments
  ansible.builtin.copy:
    src: quads_check_assignment.py
    dest: "{{ plugin_dir }}/"
    mode: '0755'
  become: true

- name: Copy check_ssl_cert Nagios check
  ansible.builtin.copy:
    src: check_ssl_cert
    dest: "{{ plugin_dir }}/"
    mode: '0755'
  become: true

- name: Generate the nagios user CGI template
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ nagios_dir }}/{{ item }}"
  loop:
    - cgi.cfg
    - services.cfg
  become: true

- name: Apply SELinux boolean nagios_run_sudo
  ansible.posix.seboolean:
    name: nagios_run_sudo
    state: true
    persistent: true
  ignore_errors: true
  become: true
  when: ansible_os_family == "RedHat"

- name: Apply SELinux boolean logging_syslogd_run_nagios_plugins
  ansible.posix.seboolean:
    name: logging_syslogd_run_nagios_plugins
    state: true
    persistent: true
  ignore_errors: true
  become: true
  when: ansible_os_family == "RedHat"

- name: Create nagios socket tmp files (rw)
  ansible.builtin.file:
    path: /var/log/nagios/rw
    state: directory
    owner: nagios
    group: "{{ web_user }}" # Debian requires www-data here
    mode: '0777'
  become: true

- name: Create nagios results directory
  ansible.builtin.file:
    path: /var/log/nagios/spool/checkresults
    state: directory
    owner: nagios
    group: nagios
    mode: '0755'
  become: true

- name: Check/fix systemd service file (RedHat)
  ansible.builtin.lineinfile:
    dest: /usr/lib/systemd/system/nagios.service
    regexp: "^ExecStopPost="
    line: "ExecStopPost=/usr/bin/rm -f /var/spool/nagios/cmd/nagios.cmd /var/log/nagios/rw/nagios.qh"
  register: systemd_nagios_changed
  become: true
  when: ansible_os_family == "RedHat"

- name: Set HTTP Listen Port
  ansible.builtin.lineinfile:
    dest: "{{ httpd_conf }}"
    regexp: "^Listen"
    line: "Listen {{ nagios_http_port }}"
  register: httpd_port_changed
  become: true

- name: Reload Systemd if needed  # noqa: no-handler
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - systemd_nagios_changed.changed is defined
    - systemd_nagios_changed.changed
  become: true

- name: Start nagios service
  ansible.builtin.service:
    name: "{{ nagios_service }}"
    state: started
    enabled: true
  become: true

- name: Restart nagios service if config changed  # noqa: no-handler
  ansible.builtin.service:
    name: "{{ nagios_service }}"
    state: restarted
  when: nagios_config.changed or nagios_objects.changed
  become: true

- name: Start HTTPD service
  ansible.builtin.service:
    name: "{{ web_service }}"
    state: started
    enabled: true
  become: true

- name: Restart HTTPD service if needed  # noqa: no-handler
  ansible.builtin.service:
    name: "{{ web_service }}"
    state: restarted
  when: httpd_port_changed.changed or nagios_config.changed
  become: true
