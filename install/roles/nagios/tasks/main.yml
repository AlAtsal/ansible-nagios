---
# Playbook to install nagios server and generate hosts/checks
# Refactored for modern Ansible modules and RHEL/Rocky 10 support

- name: Check Operating System
  ansible.builtin.fail:
    msg: "You're not running a supported operating system (CentOS7, Rocky8+, RHEL7+)"
  when:
    - ansible_os_family != "RedHat"
    - ansible_distribution_major_version|int < 7

- name: Import EPEL GPG Key
  ansible.builtin.rpm_key:
    key: "https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-{{ ansible_distribution_major_version }}"
    state: present
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int >= 7

- name: Install EPEL Repository
  ansible.builtin.dnf:
    name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ ansible_distribution_major_version }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int >= 7

- name: Install HTTPD and OpenSSL
  ansible.builtin.package:
    name:
      - httpd
      - httpd-tools
      - mod_ssl
      - openssl
      - net-snmp-utils
      - freeipmi
    state: present
  become: true

- name: Install SuperMicro Perl Dependencies
  ansible.builtin.package:
    name:
      - perl-IPC-Run
      - perl-IO-Tty
      - OpenIPMI-modalias
    state: present
  become: true
  when: supermicro_enable_checks|bool

- name: Setup nagios SSL HTTPD vhost
  ansible.builtin.copy:
    src: nagios.conf
    dest: /etc/httpd/conf.d/
  become: true

- name: Install nagios packages and common plugins
  ansible.builtin.package:
    name:
      - nagios
      - nagios-common
      - nagios-plugins-ssh
      - nagios-plugins-tcp
      - nagios-plugins-http
      - nagios-plugins-load
      - nagios-plugins-nrpe
      - nagios-plugins-uptime
      - nagios-plugins-swap
      - nagios-plugins-ping
      - nagios-plugins-procs
      - nagios-plugins-users
      - nagios-plugins-disk
      - nagios-plugins-dns
      - bc
    state: present
  become: true

- name: Install EL7 specific nagios packages
  ansible.builtin.package:
    name:
      - libsemanage-python
      - python-requests
    state: present
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int == 7

- name: Install EL8+ specific nagios packages (includes RHEL 10)
  ansible.builtin.package:
    name:
      - libsemanage-python3
      - python3-requests
    state: present
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version|int >= 8

- name: Check nagios Users
  ansible.builtin.stat:
    path: /etc/nagios/passwd
  register: nagios_user_pwfile_exists
  become: true

- name: Create empty password file
  ansible.builtin.file:
    path: /etc/nagios/passwd
    state: touch
    owner: root
    group: apache
    mode: '0640'
  when: not nagios_user_pwfile_exists.stat.exists
  become: true

- name: Create nagios admin user
  ansible.builtin.command:
    cmd: htpasswd -b /etc/nagios/passwd {{ nagios_username }} {{ nagios_password }}
  register: htpasswd_result
  changed_when: htpasswd_result.rc == 0
  become: true

- name: Create nagios guest user
  ansible.builtin.command:
    cmd: htpasswd -b /etc/nagios/passwd {{ nagios_ro_username }} {{ nagios_ro_password }}
  when: nagios_create_guest_user|bool
  register: htpasswd_guest
  changed_when: htpasswd_guest.rc == 0
  become: true

- name: Configure nagios main configuration
  ansible.builtin.copy:
    src: nagios.cfg
    dest: /etc/nagios/nagios.cfg
  become: true

- name: Copy idrac check plugin
  ansible.builtin.copy:
    src: idrac_2.2rc4
    dest: /usr/lib64/nagios/plugins/idrac_2.2rc4
    mode: '0755'
  become: true

- name: Configure Dell idrac snmp mib file
  ansible.builtin.copy:
    src: idrac-smiv2.mib
    dest: "{{ snmp_mib_path }}/"
    mode: '0755'
  become: true

- name: Create nagios socket tmp files
  ansible.builtin.file:
    path: "{{ supermicro_ipmicfg_path }}"
    state: directory
    owner: nagios
    group: nagios
    mode: '0777'
    seuser: system_u
  become: true

- name: Configure SuperMicro IPMI Check
  ansible.builtin.copy:
    src: check_ipmi_sensor
    dest: "{{ nagios_plugin_path }}/"
    mode: '0755'
  become: true

- name: Generate the SuperMicro monitoring template
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ supermicro_ipmicfg_path }}/{{ item }}"
  loop:
    - ipmi.cfg
  become: true

- name: Generate the nagios conf.d directory
  ansible.builtin.file:
    path: /etc/nagios/conf.d
    state: directory
  become: true

- name: Generate the nagios monitoring templates
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/nagios/conf.d/{{ item }}"
    force: true
  loop:
    - oobservers.cfg
    - switches.cfg
    - webservers.cfg
    - webservers_with_ssl.cfg
    - servers.cfg
    - servers_with_mdadm_raid.cfg
    - commands.cfg
    - elkservers.cfg
    - elasticsearch.cfg
    - idrac.cfg
    - supermicro_6018r.cfg
    - supermicro_6048r.cfg
    - supermicro_1028r.cfg
    - jenkins.cfg
    - dns.cfg
    - dns_with_mdadm_raid.cfg
    - freenas.cfg
    - devices.cfg
    - dns_only.cfg
    - quads_servers.cfg
    - quads_servers_with_ssl.cfg
  register: nagios_config
  become: true

- name: Generate the nagios contact template and localhost config
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/nagios/objects/{{ item }}"
    force: true
  loop:
    - contacts.cfg
    - localhost.cfg
  register: nagios_objects
  become: true

- name: Generate additional commands.cfg from template
  ansible.builtin.template:
    src: objects_commands.cfg.j2
    dest: /etc/nagios/objects/commands.cfg
    force: true
  become: true

- name: Generate templated FreeNAS Python status script
  ansible.builtin.template:
    src: check_freenas.py.j2
    dest: /usr/lib64/nagios/plugins/check_freenas.py
    mode: '0755'
    force: true
  become: true

- name: Configure quads-check-assignments
  ansible.builtin.copy:
    src: quads_check_assignment.py
    dest: "{{ nagios_plugin_path }}/"
    mode: '0755'
  become: true

- name: Copy check_ssl_cert Nagios check
  ansible.builtin.copy:
    src: check_ssl_cert
    dest: /usr/lib64/nagios/plugins/
    mode: '0755'
  become: true

- name: Generate the nagios user CGI template
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/nagios/{{ item }}"
  loop:
    - cgi.cfg
    - services.cfg
  become: true

- name: Apply SELinux boolean nagios_run_sudo
  ansible.posix.seboolean:
    name: nagios_run_sudo
    state: true
    persistent: true
  ignore_errors: true
  become: true

- name: Apply SELinux boolean logging_syslogd_run_nagios_plugins
  ansible.posix.seboolean:
    name: logging_syslogd_run_nagios_plugins
    state: true
    persistent: true
  ignore_errors: true
  become: true

- name: Create nagios socket tmp files (rw)
  ansible.builtin.file:
    path: /var/log/nagios/rw
    state: directory
    owner: nagios
    group: nagios
    mode: '0777'
    seuser: system_u
  become: true

- name: Create nagios results directory
  ansible.builtin.file:
    path: /var/log/nagios/spool/checkresults
    state: directory
    owner: nagios
    group: nagios
    mode: '0755'
    seuser: system_u
  become: true

- name: Check/fix systemd service file
  ansible.builtin.lineinfile:
    dest: /usr/lib/systemd/system/nagios.service
    regexp: "^ExecStopPost="
    line: "ExecStopPost=/usr/bin/rm -f /var/spool/nagios/cmd/nagios.cmd /var/log/nagios/rw/nagios.qh"
  register: systemd_nagios_changed
  become: true

- name: Set HTTP Listen Port
  ansible.builtin.lineinfile:
    dest: /etc/httpd/conf/httpd.conf
    regexp: "^Listen"
    line: "Listen {{ nagios_http_port }}"
  register: httpd_port_changed
  become: true

- name: Reload Systemd if needed  # noqa: no-handler
  ansible.builtin.systemd:
    daemon_reload: true
  when: systemd_nagios_changed.changed
  become: true

- name: Start nagios service
  ansible.builtin.service:
    name: nagios
    state: started
    enabled: true
  become: true

- name: Restart nagios service if config changed  # noqa: no-handler
  ansible.builtin.service:
    name: nagios
    state: restarted
  when: nagios_config.changed or nagios_objects.changed
  become: true

- name: Start HTTPD service
  ansible.builtin.service:
    name: httpd
    state: started
    enabled: true
  become: true

- name: Restart HTTPD service if needed  # noqa: no-handler
  ansible.builtin.service:
    name: httpd
    state: restarted
  when: httpd_port_changed.changed or nagios_config.changed
  become: true
