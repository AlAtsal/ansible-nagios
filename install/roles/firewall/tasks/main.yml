---
# Modern, dynamically-detected firewall configuration for Nagios Server

- name: Populate service facts to detect active firewall
  ansible.builtin.service_facts:

- name: Configure firewalld (HTTP/HTTPS)
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - http
    - https
  become: true
  when:
    - ansible_facts.services['firewalld.service'] is defined
    - ansible_facts.services['firewalld.service'].state == 'running'

- name: Configure UFW (HTTP/HTTPS)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '80'
    - '443'
  become: true
  when:
    - ansible_facts.services['ufw.service'] is defined
    - ansible_facts.services['ufw.service'].state == 'running'

- name: Configure iptables (HTTP/HTTPS)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
    state: present
  loop:
    - '80'
    - '443'
  become: true
  notify: save iptables
  when:
    - ansible_facts.services['iptables.service'] is defined
    - ansible_facts.services['iptables.service'].state == 'running'
